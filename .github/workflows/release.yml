name: Release

# Builds Linux AppImages (x86_64 + aarch64) and the Windows NSIS installer with
# sqgipkg, then publishes them as release assets for tags like `1.2.3`.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

env:
  APPIMAGE_EXTRACT_AND_RUN: '1'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Dough
        uses: actions/checkout@v4
        with:
          path: dough

      - name: Resolve latest SQGI tag
        id: sqgi
        run: |
          tag="$(
            git ls-remote --tags --refs https://github.com/supercamel/sqgi.git 'refs/tags/v*' \
              | awk -F/ '{ print $NF }' \
              | sort -V \
              | tail -n 1
          )"
          test -n "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using SQGI $tag"

      - name: Checkout sqgi (runtime + sqgipkg)
        uses: actions/checkout@v4
        with:
          repository: supercamel/sqgi
          ref: ${{ steps.sqgi.outputs.tag }}
          path: sqgi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config git file ca-certificates wget \
            meson valac gobject-introspection \
            libglib2.0-dev libgirepository-1.0-dev libffi-dev libcairo2-dev \
            libgtk-4-dev libgdk-pixbuf-2.0-dev \
            adwaita-icon-theme hicolor-icon-theme librsvg2-common shared-mime-info \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static binfmt-support \
            mingw-w64 nsis squashfs-tools

      - name: Build and install sqgi
        run: |
          cmake -S sqgi -B sqgi/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSQ_ENABLE_JIT=ON
          cmake --build sqgi/build
          sudo cmake --install sqgi/build --prefix /usr/local
          sudo ldconfig

      - name: Build Linux x86_64 AppImage
        working-directory: dough
        run: sqgipkg --target appimage --appimage-arch x86_64 --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Build Linux aarch64 AppImage
        working-directory: dough
        run: sqgipkg --target appimage --appimage-arch aarch64 --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Build Windows installer
        working-directory: dough
        run: sqgipkg --target win-nsis --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Collect artifacts
        working-directory: dough
        run: |
          mkdir -p artifacts
          cp dist-linux-x86_64/Dough.AppImage artifacts/Dough-x86_64.AppImage
          cp dist-linux-aarch64/Dough.AppImage artifacts/Dough-aarch64.AppImage
          cp dist-windows-x86_64/Dough-Setup.exe artifacts/Dough-Setup.exe
          ls -lh artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dough-builds
          path: dough/artifacts/*

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: dough
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" --clobber
